name: Deploy to hosting

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Запустить миграции (php artisan migrate --force)"
        required: false
        default: "true"

concurrency:
  group: deploy-hosting
  cancel-in-progress: false

env:
  # 8.3 нужен для openspout/zipstream из composer.lock; на хостинге также должен стоять PHP >= 8.3.
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"
  # На текущем хостинге системный `php` = 8.2, нужная версия доступна как `php84`.
  # Можно переопределить через GitHub *Variable* (Settings → Variables) HOSTING_PHP_BIN.
  # Не используйте Secret — иначе значение маскируется как *** в логах и SSH-команда падает.
  REMOTE_PHP_BIN: ${{ vars.HOSTING_PHP_BIN || 'php84' }}

jobs:
  deploy:
    name: Build & deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, gd, pdo_mysql, zip, bcmath, exif, fileinfo
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP deps (production)
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader --classmap-authoritative

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Build frontend assets (Vite)
        run: npm run build

      - name: Configure SSH client
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HOSTING_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.HOSTING_PORT }}" -H "${{ secrets.HOSTING_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.HOSTING_PORT }}" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${{ secrets.HOSTING_USERNAME }}@${{ secrets.HOSTING_HOST }}" \
            "echo connected; uname -a; ${{ env.REMOTE_PHP_BIN }} -v || true; mkdir -p '${{ secrets.HOSTING_TARGET_PATH }}'"

      - name: Write rsync exclude list
        run: |
          cat > .deploy-rsync-exclude <<'EOF'
          # VCS / IDE / OS
          .git
          .github
          .idea
          .vscode
          .fleet
          .nova
          .zed
          .DS_Store
          .editorconfig

          # Локальное окружение/инструменты
          .env
          .env.*
          auth.json
          docker
          docker-compose.yml
          Dockerfile
          phpunit.xml
          .phpunit.cache
          .phpunit.result.cache
          .phpactor.json
          README.md
          tests
          node_modules

          # Не перетираем рантайм/пользовательские данные
          /storage/logs/
          /storage/framework/cache/data/
          /storage/framework/sessions/
          /storage/framework/views/
          /storage/framework/testing/
          /storage/app/public/
          /storage/app/private/
          /storage/*.key
          /storage/pail
          /public/storage
          /public/hot
          /public/uploads
          EOF

      - name: Rsync release to hosting
        run: |
          rsync -azP \
            --delete \
            --human-readable \
            --exclude-from=.deploy-rsync-exclude \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.HOSTING_PORT }} -o StrictHostKeyChecking=yes" \
            ./ "${{ secrets.HOSTING_USERNAME }}@${{ secrets.HOSTING_HOST }}:${{ secrets.HOSTING_TARGET_PATH }}/"

      - name: Discover PHP binaries on server
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.HOSTING_PORT }}" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.HOSTING_USERNAME }}@${{ secrets.HOSTING_HOST }}" \
            'bash -lc "set +e
              echo === type php84 ===; type php84
              echo === alias php ===; alias 2>/dev/null | grep -i php
              echo === which php* ===; which php php83 php84 php8.3 php8.4 2>/dev/null
              echo === ls /usr/bin/php* ===; ls -la /usr/bin/php* 2>/dev/null
              echo === ls /usr/local/bin/php* ===; ls -la /usr/local/bin/php* 2>/dev/null
              echo === ls /usr/local/php*/bin/php ===; ls -la /usr/local/php*/bin/php 2>/dev/null
              echo === ls /opt/php-*/bin/php ===; ls -la /opt/php-*/bin/php 2>/dev/null
              echo === ls /opt/alt/php*/usr/bin/php ===; ls -la /opt/alt/php*/usr/bin/php 2>/dev/null
              echo === ls /opt/cpanel/ea-php*/root/usr/bin/php ===; ls -la /opt/cpanel/ea-php*/root/usr/bin/php 2>/dev/null
              echo === ls /opt/plesk/php/*/bin/php ===; ls -la /opt/plesk/php/*/bin/php 2>/dev/null
              echo === find quick ===; find /usr/local /opt /usr/bin -maxdepth 6 -type f \( -name php -o -name php8.4 -o -name php84 \) 2>/dev/null | head -40
              true
            "'

      - name: Render post-deploy script
        env:
          REMOTE_TARGET: ${{ secrets.HOSTING_TARGET_PATH }}
          REMOTE_PHP: ${{ env.REMOTE_PHP_BIN }}
          RUN_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations || 'true' }}
        run: |
          cat > /tmp/post-deploy.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -uo pipefail
          set -x

          : "${REMOTE_TARGET:?REMOTE_TARGET must be set}"
          : "${REMOTE_PHP:?REMOTE_PHP must be set}"
          : "${RUN_MIGRATIONS:=true}"

          # Подгрузка профилей хостинга. Делаем это аккуратно: -u временно выключаем,
          # источник ошибок не должен валить весь деплой.
          load_profile() {
            local f="$1"
            [ -f "$f" ] || return 0
            set +u
            # shellcheck disable=SC1090
            . "$f" >/dev/null 2>&1 || true
            set -u
          }
          load_profile /etc/profile
          if [ -n "${HOME:-}" ]; then
            load_profile "$HOME/.bash_profile"
            load_profile "$HOME/.profile"
            load_profile "$HOME/.bashrc"
          fi

          export PATH="${HOME:-/root}/bin:/usr/local/bin:/usr/bin:/bin:/opt/alt/php84/usr/bin:/opt/alt/php83/usr/bin:/opt/php-8.4/bin:/opt/php-8.3/bin:/opt/cpanel/ea-php84/root/usr/bin:/opt/cpanel/ea-php83/root/usr/bin:${PATH:-}"

          cd "$REMOTE_TARGET" || { echo "cd failed: $REMOTE_TARGET" >&2; exit 2; }

          PHP="$REMOTE_PHP"
          if ! command -v "$PHP" >/dev/null 2>&1; then
            for cand in php84 php83 php8.4 php8.3 \
              /opt/alt/php84/usr/bin/php /opt/alt/php83/usr/bin/php \
              /opt/php-8.4/bin/php /opt/php-8.3/bin/php \
              /opt/cpanel/ea-php84/root/usr/bin/php /opt/cpanel/ea-php83/root/usr/bin/php \
              /usr/local/bin/php8.4 /usr/local/bin/php8.3; do
              if command -v "$cand" >/dev/null 2>&1; then PHP="$cand"; break; fi
            done
          fi

          echo "Using PHP: $PHP"
          if ! command -v "$PHP" >/dev/null 2>&1; then
            echo "PHP не найден. PATH=$PATH" >&2
            exit 127
          fi
          "$PHP" -v
          "$PHP" -r 'echo PHP_BINARY, PHP_EOL;'

          if [ ! -f .env ]; then
            echo ".env отсутствует на сервере. Залейте .env вручную и перезапустите деплой." >&2
            exit 1
          fi

          mkdir -p \
            storage/app/public \
            storage/app/private \
            storage/framework/cache/data \
            storage/framework/sessions \
            storage/framework/views \
            storage/framework/testing \
            storage/logs \
            bootstrap/cache
          chmod -R u+rwX storage bootstrap/cache 2>/dev/null || true

          "$PHP" artisan storage:link 2>/dev/null || true
          "$PHP" artisan optimize:clear || true

          if [ "$RUN_MIGRATIONS" = "true" ]; then
            "$PHP" artisan migrate --force --no-interaction
          fi

          "$PHP" artisan config:cache
          "$PHP" artisan route:cache
          "$PHP" artisan view:cache
          "$PHP" artisan event:cache 2>/dev/null || true

          "$PHP" artisan filament:optimize 2>/dev/null || true
          "$PHP" artisan icons:cache 2>/dev/null || true

          "$PHP" artisan queue:restart 2>/dev/null || true

          echo "Deploy finished at $(date -Is 2>/dev/null || date)"
          SCRIPT
          chmod +x /tmp/post-deploy.sh

      - name: Upload post-deploy script
        run: |
          scp -i ~/.ssh/id_deploy -P "${{ secrets.HOSTING_PORT }}" \
            -o StrictHostKeyChecking=yes \
            /tmp/post-deploy.sh \
            "${{ secrets.HOSTING_USERNAME }}@${{ secrets.HOSTING_HOST }}:/tmp/otuken-post-deploy.sh"

      - name: Run post-deploy script
        env:
          REMOTE_TARGET: ${{ secrets.HOSTING_TARGET_PATH }}
          REMOTE_PHP: ${{ env.REMOTE_PHP_BIN }}
          RUN_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations || 'true' }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.HOSTING_PORT }}" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.HOSTING_USERNAME }}@${{ secrets.HOSTING_HOST }}" \
            "REMOTE_TARGET='${REMOTE_TARGET}' REMOTE_PHP='${REMOTE_PHP}' RUN_MIGRATIONS='${RUN_MIGRATIONS}' bash /tmp/otuken-post-deploy.sh"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
