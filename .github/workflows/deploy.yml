name: Deploy to hosting

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Запустить миграции (php artisan migrate --force)"
        required: false
        default: "true"

concurrency:
  group: deploy-hosting
  cancel-in-progress: false

env:
  # 8.3 нужен для openspout/zipstream из composer.lock; на хостинге также должен стоять PHP >= 8.3.
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"
  # На обычном хостинге cli может быть `php`, `php82`, `php8.2`, `/usr/local/bin/php`.
  # При необходимости переопределить через секрет/variable HOSTING_PHP_BIN.
  REMOTE_PHP_BIN: ${{ vars.HOSTING_PHP_BIN || 'php' }}

jobs:
  deploy:
    name: Build & deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, gd, pdo_mysql, zip, bcmath, exif, fileinfo
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP deps (production)
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader --classmap-authoritative

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build frontend assets (Vite)
        run: npm run build

      - name: Configure SSH client
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HOSTING_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.HOSTING_PORT }}" -H "${{ secrets.HOSTING_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.HOSTING_PORT }}" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${{ secrets.HOSTING_USERNAME }}@${{ secrets.HOSTING_HOST }}" \
            "echo connected; uname -a; ${{ env.REMOTE_PHP_BIN }} -v || true; mkdir -p '${{ secrets.HOSTING_TARGET_PATH }}'"

      - name: Write rsync exclude list
        run: |
          cat > .deploy-rsync-exclude <<'EOF'
          # VCS / IDE / OS
          .git
          .github
          .idea
          .vscode
          .fleet
          .nova
          .zed
          .DS_Store
          .editorconfig

          # Локальное окружение/инструменты
          .env
          .env.*
          auth.json
          docker
          docker-compose.yml
          Dockerfile
          phpunit.xml
          .phpunit.cache
          .phpunit.result.cache
          .phpactor.json
          README.md
          tests
          node_modules

          # Не перетираем рантайм/пользовательские данные
          /storage/logs/
          /storage/framework/cache/data/
          /storage/framework/sessions/
          /storage/framework/views/
          /storage/framework/testing/
          /storage/app/public/
          /storage/app/private/
          /storage/*.key
          /storage/pail
          /public/storage
          /public/hot
          /public/uploads
          EOF

      - name: Rsync release to hosting
        run: |
          rsync -azP \
            --delete \
            --human-readable \
            --exclude-from=.deploy-rsync-exclude \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.HOSTING_PORT }} -o StrictHostKeyChecking=yes" \
            ./ "${{ secrets.HOSTING_USERNAME }}@${{ secrets.HOSTING_HOST }}:${{ secrets.HOSTING_TARGET_PATH }}/"

      - name: Post-deploy artisan commands
        env:
          RUN_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations || 'true' }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.HOSTING_PORT }}" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.HOSTING_USERNAME }}@${{ secrets.HOSTING_HOST }}" \
            bash -se <<EOF
          set -euo pipefail
          cd "${{ secrets.HOSTING_TARGET_PATH }}"

          PHP="${{ env.REMOTE_PHP_BIN }}"

          if [ ! -f .env ]; then
            echo ".env отсутствует на сервере. Залейте .env вручную и перезапустите деплой." >&2
            exit 1
          fi

          # Symlink storage → public/storage. На shared-хостинге может уже быть.
          \$PHP artisan storage:link 2>/dev/null || true

          # Сброс старых кэшей перед пересборкой
          \$PHP artisan optimize:clear || true

          if [ "${RUN_MIGRATIONS}" = "true" ]; then
            \$PHP artisan migrate --force --no-interaction
          fi

          \$PHP artisan config:cache
          \$PHP artisan route:cache
          \$PHP artisan view:cache
          \$PHP artisan event:cache 2>/dev/null || true

          # Filament
          \$PHP artisan filament:optimize 2>/dev/null || true
          \$PHP artisan icons:cache 2>/dev/null || true

          # Перезапуск воркеров, если используется queue
          \$PHP artisan queue:restart 2>/dev/null || true

          echo "Deploy finished at \$(date -Is)"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
