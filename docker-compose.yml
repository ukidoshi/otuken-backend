version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_FPM_VERSION: ${PHP_FPM_VERSION:-8.3}
    container_name: otuken_app
    environment:
      APP_URL: ${APP_URL:-http://localhost:8081}
    working_dir: /var/www/html
    command: >
      sh -c "php artisan storage:link --force --no-interaction 2>/dev/null || true;
      exec docker-php-entrypoint php-fpm"
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql

  web:
    image: nginx:1.27-alpine
    container_name: otuken_nginx
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: otuken_mysql
    environment:
      MYSQL_DATABASE: otuken
      MYSQL_USER: otuken
      MYSQL_PASSWORD: otuken
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
